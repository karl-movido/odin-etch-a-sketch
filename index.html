<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Etch-A-Sketch</h1>
    <div class="main-wrapper">
      <div class="left">
        <button id="new-canvas" class="canvas-btn">Create Canvas</button>
        <button id="clear-canvas" class="canvas-btn">Clear Canvas</button>
        <p id="size-display" class="size-display">Size: 16 x 16</p>
        <div class="tools" id="tools">
          <button id="eraser" class="eraser" data-value="lightgray">
            Eraser
          </button>
          <button id="black" class="black" data-value="black">Black</button>
          <button id="red" class="red" data-value="#e63946">Red</button>
          <button id="blue" class="blue" data-value="#0077b6">Blue</button>
          <button id="yellow" class="yellow" data-value="#fff3b0">
            Yellow
          </button>
        </div>
      </div>
      <div class="middle">
        <div id="container" class="container"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
